name: build python
on:
  push:
    tags: [ 'v*' ]
permissions:
  contents: write  

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # 获取完整历史记录

    - name: Extract version (fix double v issue)
      id: get_version
      run: |
        # 正确处理版本号，移除开头的 v
        $version = "${{ github.ref_name }}"
        if ($version.StartsWith('v')) {
            $version = $version.Substring(1)
        }
        echo "version=$version" >> $env:GITHUB_OUTPUT
        echo "Cleaned version: $version"

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: |
        pyinstaller --onefile main.py

    - name: Create ZIP package
      id: create_package
      run: |
        $version = "${{ steps.get_version.outputs.version }}"
        $packageName = "AutoBoss-v$version"
        
        # 创建压缩包
        Compress-Archive -Path "dist/main.exe" -DestinationPath "$packageName.zip" -Force
        
        # 验证文件存在
        if (Test-Path "$packageName.zip") {
            echo "✅ Package created: $packageName.zip"
            echo "package_name=$packageName.zip" >> $env:GITHUB_OUTPUT
        } else {
            echo "❌ Package creation failed"
            exit 1
        }

    - name: List files for debugging
      run: |
        echo "Current directory:"
        Get-Location
        echo "Files:"
        Get-ChildItem -Recurse
        echo "Package files:"
        Get-ChildItem *.zip

    - name: Update release with assets (不覆盖内容)
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.ref_name }}
        # 使用现有内容，不重新生成
        body_path: ${{ steps.release-info.outputs.body_file }}
        files: ${{ steps.build.outputs.package_name }}
        # 设置为 true 表示更新现有 release
        update: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
