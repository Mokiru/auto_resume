name: build python

on:
  push:
    branches: [ master ]
permissions:
  contents: write
  actions: write

jobs:
  analyze-commits:
    runs-on: ubuntu-latest  # 使用Linux，避免PowerShell相关问题
    outputs:
      version-type: ${{ steps.analyze.outputs.version-type }}
      should-release: ${{ steps.analyze.outputs.should-release }}
      new-tag: ${{ steps.analyze.outputs.new-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Analyze commits and calculate version
        id: analyze
        run: |
          # 获取最新提交信息
          LATEST_COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Latest commit: $LATEST_COMMIT_MSG"
          
          # 获取最新的tag
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # 解析版本号
          if [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]} 
            PATCH=${BASH_REMATCH[3]}
            echo "解析版本: v$MAJOR.$MINOR.$PATCH"
          else
            MAJOR=0
            MINOR=0
            PATCH=0
            echo "使用默认版本: v0.0.0"
          fi
          
          # 分析提交信息决定版本类型
          VERSION_TYPE="skip"
          SHOULD_RELEASE="false"
          
          if [[ $LATEST_COMMIT_MSG =~ (feat:|feature:) ]]; then
            VERSION_TYPE="minor"
            SHOULD_RELEASE="true"
            echo "✅ 检测到 feat/feature，触发 minor 版本发布"
          elif [[ $LATEST_COMMIT_MSG =~ (fix:|bugfix:) ]]; then
            VERSION_TYPE="patch"
            SHOULD_RELEASE="true"
            echo "✅ 检测到 fix/bugfix，触发 patch 版本发布"
          elif [[ $LATEST_COMMIT_MSG =~ (BREAKING\ CHANGE:|major:) ]]; then
            VERSION_TYPE="major"
            SHOULD_RELEASE="true"
            echo "✅ 检测到 BREAKING CHANGE/major，触发 major 版本发布"
          else
            VERSION_TYPE="skip"
            SHOULD_RELEASE="false"
            echo "❌ 未检测到触发发布的提交类型，跳过发布"
          fi
          
          echo "Version type: $VERSION_TYPE"
          echo "Should release: $SHOULD_RELEASE"
          
          # 根据分析结果计算新版本
          case $VERSION_TYPE in
            "major")
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              echo "🔄 Major 版本升级: v$MAJOR.$MINOR.$PATCH"
              ;;
            "minor")
              MINOR=$((MINOR + 1))
              PATCH=0
              echo "🔄 Minor 版本升级: v$MAJOR.$MINOR.$PATCH"
              ;;
            "patch")
              PATCH=$((PATCH + 1))
              echo "🔄 Patch 版本升级: v$MAJOR.$MINOR.$PATCH"
              ;;
            *)
              echo "⚪ 跳过版本升级，使用现有标签: $LATEST_TAG"
              NEW_VERSION=$LATEST_TAG
              ;;
          esac
          
          if [ -z "$NEW_VERSION" ]; then
            NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          
          echo "新版本: $NEW_VERSION"
          
          # 设置输出
          echo "version-type=$VERSION_TYPE" >> $GITHUB_OUTPUT
          echo "should-release=$SHOULD_RELEASE" >> $GITHUB_OUTPUT
          echo "new-tag=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          echo "✅ 输出设置完成"

  create-tag:
    needs: analyze-commits
    if: needs.analyze-commits.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git tag
        run: |
          TAG="${{ needs.analyze-commits.outputs.new-tag }}"
          echo "创建标签: $TAG"
          
          # 配置Git用户信息
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 创建并推送标签
          git tag $TAG
          git push origin $TAG
          echo "✅ 标签 $TAG 创建成功"

  build-windows:
    needs: [ analyze-commits, create-tag ]
    runs-on: windows-latest
    steps:
      - name: Debug information
        run: |
          echo "=== 构建调试信息 ==="
          echo "是否需要发布: ${{ needs.analyze-commits.outputs.should-release }}"
          echo "版本类型: ${{ needs.analyze-commits.outputs.version-type }}"
          echo "新标签: ${{ needs.analyze-commits.outputs.new-tag }}"
          echo "================="

      - name: Determine target tag
        id: target-tag
        run: |
          if ( "${{ needs.analyze-commits.outputs.should-release }}" -eq "true" ) {
            $TAG="${{ needs.analyze-commits.outputs.new-tag }}"
          } else {
            $TAG=$(git describe --tags --abbrev=0 2>$null || echo "v0.0.0")
          }
          
          # 清理版本号（移除开头的v）
          $VERSION=$TAG -replace '^v', ''
          
          echo "TAG_NAME=$TAG" >> $env:GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          Write-Host "最终版本: $VERSION"

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          if (Test-Path "requirements.txt" ) {
            pip install -r requirements.txt
          }
          pip install pyinstaller

      - name: Build boss.exe executable
        run: |
          if (Test-Path "boss.py" ) {
            pyinstaller --onefile boss.py
          } else {
            Write-Error "❌ boss.py 文件不存在"
            Get-ChildItem
            exit 1
          }

      - name: Build liepin.exe executable
        run: |
          if (Test-Path "liepin.py" ) {
            pyinstaller --onefile liepin.py
            Write-Host "✅ liepin.py 打包完成"
          } else {
            Write-Error "❌ liepin.py 文件不存在"
            Get-ChildItem
            exit 1
          }

      - name: Create ZIP package
        id: create_package
        run: |
          $VERSION="${{ steps.target-tag.outputs.VERSION }}"
          Write-Host "创建压缩包:"
          $BOSS_PACKAGE="AutoBoss-Windows-v$VERSION.zip"
          if (Test-Path "dist/boss.exe" ) {
            Write-Host "找到Windows可执行文件: dist/boss.exe"
            Compress-Archive -Path "dist/boss.exe" -DestinationPath "$BOSS_PACKAGE"
            Write-Host "✅ Package created: $BOSS_PACKAGE"
          } else {
            Write-Error "❌ 可执行文件不存在"
            Get-ChildItem -Path "dist/" -ErrorAction SilentlyContinue
            Get-ChildItem -Recurse -Filter "boss*" -ErrorAction SilentlyContinue
            exit 1
          }
          
          # 创建liepin压缩包
          $LIEPIN_PACKAGE="AutoLiepin-Windows-v$VERSION.zip"
          if (Test-Path "dist/liepin.exe" ) {
            Compress-Archive -Path "dist/liepin.exe" -DestinationPath "$LIEPIN_PACKAGE"
            Write-Host "✅ Liepin包创建成功: $LIEPIN_PACKAGE"
          } else {
            Write-Error "❌ liepin.exe 不存在"
            exit 1
          }
          
          echo "boss_name=$BOSS_PACKAGE" >> $env:GITHUB_OUTPUT
          echo "liepin_name=$LIEPIN_PACKAGE" >> $env:GITHUB_OUTPUT
          # 列出所有文件确认
          Get-ChildItem -Name "*.zip"
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-packages
          path: |
            ${{ steps.create_windows_package.outputs.boss_name }}
            ${{ steps.create_windows_package.outputs.liepin_name }}
  build-macos:
    needs: [ analyze-commits, create-tag ]
    runs-on: macos-latest
    steps:
      - name: Debug information
        run: |          
          echo "=== macOS 构建调试信息 ==="
          echo "是否需要发布: ${{ needs.analyze-commits.outputs.should-release }}"
          echo "版本类型: ${{ needs.analyze-commits.outputs.version-type }}"
          echo "新标签: ${{ needs.analyze-commits.outputs.new-tag }}"
          echo "================="

      - name: Determine target tag
        id: target-tag
        run: |          
          if [ "${{ needs.analyze-commits.outputs.should-release }}" = "true" ]; then
          TAG="${{ needs.analyze-commits.outputs.new-tag }}"
          else
          TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          fi
          
          # 清理版本号（移除开头的v）
          VERSION=${TAG#v}
          
          echo "TAG_NAME=$TAG" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "最终版本: $VERSION"
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |          
          pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          fi
          pip install pyinstaller
      - name: Build boss executable for macOS
        run: |          
          if [ -f "boss.py" ]; then
          pyinstaller --onefile boss.py
          else
          echo "❌ boss.py 文件不存在"
          ls -la
          exit 1
          fi
      - name: Build liepin executable for macOS
        run: |          
          if [ -f "liepin.py" ]; then
          pyinstaller --onefile liepin.py
          echo "✅ liepin.py 打包完成"
          else
          echo "❌ liepin.py 文件不存在"
          ls -la
          exit 1
          fi
      - name: Create ZIP package for macOS
        id: create_macos_package
        run: |          
          VERSION="${{ steps.target-tag.outputs.VERSION }}"
          echo "创建macOS压缩包:"
          BOSS_PACKAGE="AutoBoss-macOS-v$VERSION.zip"
          if [ -f "dist/boss" ]; then
            echo "找到macOS可执行文件: dist/boss"
            zip -r "$BOSS_PACKAGE" dist/boss
            echo "✅ macOS Boss Package created: $BOSS_PACKAGE"
          else
            echo "❌ 可执行文件不存在"
            ls -la dist/
            find . -name "boss*" -type f
            exit 1
          fi
          
          # 创建liepin压缩包
          LIEPIN_PACKAGE="AutoLiepin-macOS-v$VERSION.zip"
          if [ -f "dist/liepin" ]; then
            zip -r "$LIEPIN_PACKAGE" dist/liepin
            echo "✅ macOS Liepin包创建成功: $LIEPIN_PACKAGE"
          else
            echo "❌ liepin 不存在"
            exit 1
          fi
          
          echo "boss_name=$BOSS_PACKAGE" >> $GITHUB_OUTPUT
          echo "liepin_name=$LIEPIN_PACKAGE" >> $GITHUB_OUTPUT
          # 列出所有文件确认
          ls -la *.zip
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-packages
          path: |            
            ${{ steps.create_macos_package.outputs.boss_name }}
            ${{ steps.create_macos_package.outputs.liepin_name }}
  create-release:
    needs: [ build-macos, build-windows ]
    runs-on: ubuntu-latest
    steps:
      - name: Download all packages
        uses: actions/download-artifact@v4
        with:
          path: ./packages

      - name: List downloaded packages
        run: |          
          echo "下载的包文件:"
          find ./packages -name "*.zip" -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: needs.analyze-commits.outputs.should-release == 'true'
        with:
          tag_name: ${{ needs.analyze-commits.outputs.new-tag }}
          name: Release ${{ needs.analyze-commits.outputs.new-tag }}
          body: |            # AutoBoss ${{ needs.analyze-commits.outputs.new-tag }}
            
            ## 自动构建版本
            
            ### 构建信息
            - **版本**: ${{ needs.analyze-commits.outputs.new-tag }}
            - **构建时间**: $(date -Iseconds)
            - **提交**: ${{ github.sha }}
            - **触发提交**: ${{ github.event.head_commit.message }}
            
            ### 下载选项
            - Windows 版本: AutoBoss-Windows-v${{ needs.analyze-commits.outputs.new-tag }}.zip, AutoLiepin-Windows-v${{ needs.analyze-commits.outputs.new-tag }}.zip
            - macOS 版本: AutoBoss-macOS-v${{ needs.analyze-commits.outputs.new-tag }}.zip, AutoLiepin-macOS-v${{ needs.analyze-commits.outputs.new-tag }}.zip
          files: |            
            packages/windows-packages/*
            packages/macos-packages/*
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success notification
        run: |          
          echo "🎉 构建和发布完成!"
          echo "📦 版本: ${{ needs.analyze-commits.outputs.new-tag }}"