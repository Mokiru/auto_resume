name: build python

on:
  push:
    branches: [ master ]

jobs:
  analyze-commits:
    runs-on: windows-latest
    outputs:
      version-type: ${{ steps.analyze.outputs.version-type }}
      should-release: ${{ steps.analyze.outputs.should-release }}
      new-tag: ${{ steps.analyze.outputs.new-tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Analyze commits and calculate version
        id: analyze
        run: |
          # 获取最新提交信息
          $LATEST_COMMIT_MSG = git log -1 --pretty=%B
          Write-Host "Latest commit: $LATEST_COMMIT_MSG"
          
          # 获取最新的tag
          $LATEST_TAG = git describe --tags --abbrev=0 2>$null
          if (-not $LATEST_TAG) { 
            $LATEST_TAG = "v0.0.0" 
          }
          Write-Host "Latest tag: $LATEST_TAG"
          
          # 解析版本号
          if ($LATEST_TAG -match "^v(\d+)\.(\d+)\.(\d+)$") {
            $MAJOR = $Matches[1]
            $MINOR = $Matches[2] 
            $PATCH = $Matches[3]
            Write-Host "解析版本: v$MAJOR.$MINOR.$PATCH"
          } else {
            $MAJOR = 0
            $MINOR = 0
            $PATCH = 0
            Write-Host "使用默认版本: v0.0.0"
          }
          
          # 分析提交信息决定版本类型
          $VERSION_TYPE = "skip"
          $SHOULD_RELEASE = "false"
          
          if ($LATEST_COMMIT_MSG -match "feat:" -or $LATEST_COMMIT_MSG -match "feature:") {
            $VERSION_TYPE = "minor"
            $SHOULD_RELEASE = "true"
            Write-Host "✅ 检测到 feat/feature，触发 minor 版本发布"
          } elseif ($LATEST_COMMIT_MSG -match "fix:" -or $LATEST_COMMIT_MSG -match "bugfix:") {
            $VERSION_TYPE = "patch"
            $SHOULD_RELEASE = "true"
            Write-Host "✅ 检测到 fix/bugfix，触发 patch 版本发布"
          } elseif ($LATEST_COMMIT_MSG -match "BREAKING CHANGE:" -or $LATEST_COMMIT_MSG -match "major:") {
            $VERSION_TYPE = "major"
            $SHOULD_RELEASE = "true"
            Write-Host "✅ 检测到 BREAKING CHANGE/major，触发 major 版本发布"
          } else {
            $VERSION_TYPE = "skip"
            $SHOULD_RELEASE = "false"
            Write-Host "❌ 未检测到触发发布的提交类型，跳过发布"
          }
          
          Write-Host "Version type: $VERSION_TYPE"
          Write-Host "Should release: $SHOULD_RELEASE"
          
          # 根据分析结果计算新版本
          switch ($VERSION_TYPE) {
            "major" {
              $MAJOR = [int]$MAJOR + 1
              $MINOR = 0
              $PATCH = 0
              Write-Host "🔄 Major 版本升级: v$MAJOR.$MINOR.$PATCH"
            }
            "minor" {
              $MINOR = [int]$MINOR + 1
              $PATCH = 0
              Write-Host "🔄 Minor 版本升级: v$MAJOR.$MINOR.$PATCH"
            }
            "patch" {
              $PATCH = [int]$PATCH + 1
              Write-Host "🔄 Patch 版本升级: v$MAJOR.$MINOR.$PATCH"
            }
            default {
              Write-Host "⚪ 跳过版本升级，使用现有标签: $LATEST_TAG"
              # 使用当前最新tag作为新版本
              $NEW_VERSION = $LATEST_TAG
            }
          }
          
          if (-not $NEW_VERSION) {
            $NEW_VERSION = "v${MAJOR}.${MINOR}.${PATCH}"
          }
          
          Write-Host "新版本: $NEW_VERSION"
          
          # 设置输出
          Write-Host "version-type=$VERSION_TYPE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "should-release=$SHOULD_RELEASE" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "new-tag=$NEW_VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  create-tag:
    needs: analyze-commits
    if: needs.analyze-commits.outputs.should-release == 'true'
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Debug outputs
        run: |
          Write-Host "=== 调试信息 ==="
          Write-Host "版本类型: ${{ needs.analyze-commits.outputs.version-type }}"
          Write-Host "是否发布: ${{ needs.analyze-commits.outputs.should-release }}"
          Write-Host "新标签: ${{ needs.analyze-commits.outputs.new-tag }}"
          Write-Host "================="

      - name: Create Git tag
        run: |
          $TAG = "${{ needs.analyze-commits.outputs.new-tag }}"
          $SHA = "${{ github.sha }}"
          
          Write-Host "创建标签: $TAG (提交: $SHA)"
          
          # 检查标签是否已存在
          $existing_tag = git ls-remote --tags origin "refs/tags/$TAG" 2>$null
          if ($existing_tag) {
            Write-Host "⚠️ 标签 $TAG 已存在，跳过创建"
          } else {
            # 创建并推送标签
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git tag $TAG $SHA
            git push origin $TAG
            Write-Host "✅ 标签 $TAG 创建成功"
          }

  build-and-release:
    needs: [analyze-commits, create-tag]
    runs-on: windows-latest
    steps:
      - name: Debug information
        run: |
          Write-Host "=== 构建调试信息 ==="
          Write-Host "触发事件: ${{ github.event_name }}"
          Write-Host "引用: ${{ github.ref }}"
          Write-Host "引用名称: ${{ github.ref_name }}"
          Write-Host "SHA: ${{ github.sha }}"
          Write-Host "是否需要发布: ${{ needs.analyze-commits.outputs.should-release }}"
          Write-Host "版本类型: ${{ needs.analyze-commits.outputs.version-type }}"
          Write-Host "新标签: ${{ needs.analyze-commits.outputs.new-tag }}"
          Write-Host "================="

      - name: Determine target tag
        id: target-tag
        run: |
          # 决定使用哪个标签
          if ("${{ needs.analyze-commits.outputs.should-release }}" -eq "true") {
            $TAG = "${{ needs.analyze-commits.outputs.new-tag }}"
            Write-Host "使用新标签: $TAG"
          } else {
            # 获取最新的现有标签
            $TAG = git describe --tags --abbrev=0 2>$null
            if (-not $TAG) { 
              $TAG = "v0.0.0" 
              Write-Host "⚠️ 未找到现有标签，使用默认: $TAG"
            } else {
              Write-Host "使用现有标签: $TAG"
            }
          }
          
          # 清理版本号（移除开头的v）
          $VERSION = $TAG
          if ($VERSION.StartsWith('v')) {
              $VERSION = $VERSION.Substring(1)
          }
          
          Write-Host "TAG_NAME=$TAG" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "VERSION=$VERSION" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "最终版本: $VERSION"

      - name: Checkout specific tag
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.target-tag.outputs.TAG_NAME }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        run: |
          pyinstaller --onefile main.py

      - name: Create ZIP package
        id: create_package
        run: |
          $version = "${{ steps.target-tag.outputs.VERSION }}"
          $packageName = "AutoBoss-v$version"
          
          Write-Host "创建压缩包: $packageName.zip"
          
          # 确保dist目录存在
          if (-not (Test-Path "dist\main.exe")) {
            Write-Host "❌ 可执行文件不存在: dist\main.exe"
            Get-ChildItem -Recurse
            exit 1
          }
          
          # 创建压缩包
          Compress-Archive -Path "dist\main.exe" -DestinationPath "$packageName.zip" -Force
          
          # 验证文件存在
          if (Test-Path "$packageName.zip") {
            Write-Host "✅ Package created: $packageName.zip"
            $fileSize = (Get-Item "$packageName.zip").Length
            Write-Host "文件大小: $fileSize bytes"
            Write-Host "package_name=$packageName.zip" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } else {
            Write-Host "❌ Package creation failed"
            exit 1
          }

      - name: Check if release exists
        id: check-release
        run: |
          $TAG = "${{ steps.target-tag.outputs.TAG_NAME }}"
          Write-Host "检查发布是否存在: $TAG"
          
          try {
            $headers = @{
              Authorization = "token ${{ secrets.GITHUB_TOKEN }}"
              Accept = "application/vnd.github.v3+json"
            }
            $response = Invoke-RestMethod -Uri "https://api.github.com/repos/${{ github.repository }}/releases/tags/$TAG" -Headers $headers
            Write-Host "发布已存在，ID: $($response.id)"
            Write-Host "release_exists=true" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            Write-Host "release_id=$($response.id)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          } catch {
            if ($_.Exception.Response.StatusCode -eq 404) {
              Write-Host "发布不存在"
              Write-Host "release_exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            } else {
              Write-Host "检查发布时出错: $($_.Exception.Message)"
              Write-Host "release_exists=false" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
            }
          }

      - name: Create new release
        if: steps.check-release.outputs.release_exists == 'false'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.target-tag.outputs.TAG_NAME }}
          name: Release ${{ steps.target-tag.outputs.TAG_NAME }}
          body: |
            # AutoBoss ${{ steps.target-tag.outputs.TAG_NAME }}
            
            ## 自动构建版本
            
            ### 下载
            - [AutoBoss-v${{ steps.target-tag.outputs.VERSION }}.zip](AutoBoss-v${{ steps.target-tag.outputs.VERSION }}.zip)
            
            ### 构建信息
            - **版本**: ${{ steps.target-tag.outputs.TAG_NAME }}
            - **构建时间**: $((Get-Date).ToString("yyyy-MM-dd HH:mm:ss"))
            - **提交**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
            - **触发提交**: ${{ github.event.head_commit.message }}
          files: ${{ steps.create_package.outputs.package_name }}
          draft: false
          prerelease: ${{ contains(github.ref, 'beta') || contains(github.ref, 'alpha') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update existing release
        if: steps.check-release.outputs.release_exists == 'true'
        uses: actions/upload-release-asset@v1
        with:
          upload_url: https://uploads.github.com/repos/${{ github.repository }}/releases/${{ steps.check-release.outputs.release_id }}/assets{?name,label}
          asset_path: ${{ steps.create_package.outputs.package_name }}
          asset_name: AutoBoss-v${{ steps.target-tag.outputs.VERSION }}.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Success notification
        run: |
          Write-Host "🎉 构建和发布完成!"
          Write-Host "📦 版本: ${{ steps.target-tag.outputs.TAG_NAME }}"
          Write-Host "📁 包文件: ${{ steps.create_package.outputs.package_name }}"
          if ("${{ steps.check-release.outputs.release_exists }}" -eq "true") {
            Write-Host "✅ 已更新现有发布"
          } else {
            Write-Host "✅ 已创建新发布"
          }