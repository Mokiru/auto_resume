# .github/workflows/semantic-release.yml
name: Semantic Auto Release

on:
  push:
    branches: [ master ]

jobs:
  analyze-commits:
    runs-on: ubuntu-latest
    outputs:
      version-type: ${{ steps.analyze.outputs.version-type }}
      should-release: ${{ steps.analyze.outputs.should-release }}
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Analyze commits for version bump
      id: analyze
      run: |
        # 获取最新提交信息
        LATEST_COMMIT_MSG=$(git log -1 --pretty=%B)
        echo "Latest commit: $LATEST_COMMIT_MSG"
        
        # 分析提交信息决定版本类型
        if [[ $LATEST_COMMIT_MSG == *"feat:"* ]] || [[ $LATEST_COMMIT_MSG == *"feature:"* ]]; then
          echo "version-type=minor" >> $GITHUB_OUTPUT
          echo "should-release=true" >> $GITHUB_OUTPUT
        elif [[ $LATEST_COMMIT_MSG == *"fix:"* ]] || [[ $LATEST_COMMIT_MSG == *"bugfix:"* ]]; then
          echo "version-type=patch" >> $GITHUB_OUTPUT
          echo "should-release=true" >> $GITHUB_OUTPUT
        elif [[ $LATEST_COMMIT_MSG == *"BREAKING CHANGE:"* ]] || [[ $LATEST_COMMIT_MSG == *"major:"* ]]; then
          echo "version-type=major" >> $GITHUB_OUTPUT
          echo "should-release=true" >> $GITHUB_OUTPUT
        else
          echo "version-type=skip" >> $GITHUB_OUTPUT
          echo "should-release=false" >> $GITHUB_OUTPUT
        fi
        
        echo "version-type: ${{ steps.analyze.outputs.version-type }}"
        echo "should-release: ${{ steps.analyze.outputs.should-release }}"

  create-release:
    needs: analyze-commits
    if: needs.analyze-commits.outputs.should-release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get latest version
      id: versions
      run: |
        # 获取最新的tag
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag: $LATEST_TAG"
        
        # 解析版本号
        if [[ $LATEST_TAG =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
          MAJOR=${BASH_REMATCH[1]}
          MINOR=${BASH_REMATCH[2]}
          PATCH=${BASH_REMATCH[3]}
        else
          MAJOR=0
          MINOR=0
          PATCH=0
        fi
        
        # 根据分析结果增加版本
        VERSION_TYPE=${{ needs.analyze-commits.outputs.version-type }}
        case $VERSION_TYPE in
          "major")
            MAJOR=$((MAJOR + 1))
            MINOR=0
            PATCH=0
            ;;
          "minor")
            MINOR=$((MINOR + 1))
            PATCH=0
            ;;
          "patch")
            PATCH=$((PATCH + 1))
            ;;
        esac
        
        NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
        echo "NEW_VERSION=$NEW_VERSION" >> $GITHUB_OUTPUT
        echo "NEW_TAG=$NEW_VERSION" >> $GITHUB_OUTPUT

    - name: Create Git tag
      uses: actions/github-script@v7
      with:
        script: |
          const tag = '${{ steps.versions.outputs.NEW_TAG }}';
          const sha = '${{ github.sha }}';
          
          try {
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: sha
            });
            console.log(`Tag ${tag} created successfully`);
          } catch (error) {
            if (error.status === 422) {
              console.log(`Tag ${tag} already exists`);
            } else {
              throw error;
            }
          }
